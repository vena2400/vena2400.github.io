<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트릭툰</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

.header{
    padding:15px;
    background:#D9F1A4;
}

.comic{
    max-width:900px;
    margin:auto;
}

.comic img{
    width:100%;
    display:block;
}
</style>
</head>

<body>

<div class="header">
<a href="index.html">← 목록으로</a>
</div>

<div id="comic" class="comic"></div>

<script>

const id = Number(
    new URLSearchParams(location.search).get("id")
);

fetch("data/comics.json")
.then(r=>r.json())
.then(data=>{

    const comic = data.find(c=>c.id===id);

    if(!comic){
        document.getElementById("comic").innerHTML=
        "<h2>회차를 찾을 수 없습니다.</h2>";
        return;
    }

    let html = `
        <h2>${comic.title}</h2>
        <p>${comic.author}</p>
        <p>${comic.date}</p>
    `;

comic.files.forEach(file => {

    html += `
    <img
    src="images/${String(comic.id).padStart(4,'0')}/${file}"
    >
    `;

});

    document.getElementById("comic").innerHTML=html;

});

</script>

</body>
</html>
