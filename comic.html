<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트릭툰</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

body.dark{
    background:#121212;
    color:white;
}

body.dark a{
    color:#8ecbff;
}

.header{
    padding:15px;
    background:#D9F1A4;
}

.comic{
    max-width:900px;
    margin:auto;
}

.comic img{
    width:100%;
    display:block;
}

#episodeNav a{
    background:#D9F1A4;
    color:#222;
    text-decoration:none;
    padding:14px 28px;
    border-radius:999px;
    font-weight:700;
    min-width:120px;
    text-align:center;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    transition:.2s;
}
</style>
</head>

<body>

<div class="header">
<a href="index.html">← 목록으로</a>
</div>

<div id="comic" class="comic"></div>

<div id="episodeNav" style="
max-width:900px;
margin:20px auto;
display:flex;
justify-content:space-between;
">
</div>

<script>

if(localStorage.getItem('theme') === 'dark'){
    document.body.classList.add('dark');
}

const id = Number(
    new URLSearchParams(location.search).get("id")
);

fetch("data/comics.json")
.then(r=>r.json())
.then(data=>{

    const comic = data.find(c=>c.id===id);

    if(!comic){
        document.getElementById("comic").innerHTML=
        "<h2>회차를 찾을 수 없습니다.</h2>";
        return;
    }

    let html = `
        <h2>${comic.title}</h2>
        <p>${comic.author}</p>
        <p>${comic.date}</p>
    `;

comic.files.forEach(file => {

    html += `
    <img src="${file}">
    `;

});

    document.getElementById("comic").innerHTML=html;

const currentIndex =
    data.findIndex(c => c.id === id);

const prev = data[currentIndex - 1];
const next = data[currentIndex + 1];

let nav = "";

if(prev){
    nav += `
    <a href="comic.html?id=${prev.id}">
    ← 이전화
    </a>
    `;
}else{
    nav += "<span></span>";
}

if(next){
    nav += `
    <a href="comic.html?id=${next.id}">
    다음화 →
    </a>
    `;
}

document.getElementById("episodeNav").innerHTML = nav;

});

</script>

</body>
</html>
